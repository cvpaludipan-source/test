version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ict_borrow
      DB_USER: ict
      DB_PASS: ictpass
      APP_ENV: development
    depends_on:
      - db
    volumes:
      - .:/var/www/html
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ict_borrow
      MYSQL_USER: ict
      MYSQL_PASSWORD: ictpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:

